<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product — ShopSwift</title>
  <link rel="stylesheet" href="assets/edit.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    /* YouTube-style product video player */
    .video-player { position:relative; width:100%; height:100%; background:#000; cursor:pointer; overflow:hidden; }
    .video-player video { width:100%; height:100%; object-fit:contain; display:block; background:#000; }
    .video-play-btn {
      position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
      width:68px; height:48px; border:none; border-radius:12px; padding:0;
      background:rgba(20,20,20,0.75); display:flex; align-items:center; justify-content:center;
      cursor:pointer; transition:background .15s ease;
    }
    .video-player:hover .video-play-btn { background:#cc0000; }   /* YouTube-red on hover */
    .video-play-btn svg { margin-left:3px; }
    .video-badge {
      position:absolute; bottom:10px; right:10px; background:rgba(0,0,0,0.75); color:#fff;
      font-size:11px; font-weight:600; padding:3px 8px; border-radius:4px; letter-spacing:.3px;
      display:flex; align-items:center; gap:4px; pointer-events:none;
    }
    /* Play badge on listing/related cards that have a video */
    .card-video-badge {
      position:absolute; top:8px; left:8px; background:rgba(0,0,0,0.7); color:#fff;
      width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    }
  </style>
</head>
<body class="product-page">

  <div id="header-placeholder"></div>

  <!-- BREADCRUMB -->
  <div style="max-width:1100px;margin:0 auto;padding:1rem 2rem 0;font-size:13px;color:#6b7280;">
    <a href="home.html" style="color:#6b7280;text-decoration:none;">Home</a> /
    <a href="search and browse.html" style="color:#6b7280;text-decoration:none;">Browse</a> /
    <a href="#" id="bread-shop" style="color:#6b7280;text-decoration:none;"></a> /
    <span id="bread-product" style="color:#1c1c1c;font-weight:500;"></span>
  </div>

  <!-- MAIN DETAIL LAYOUT -->
  <div class="product-detail-wrap">

    <!-- LEFT: Gallery -->
    <div>
      <div class="product-gallery">
        <div class="product-main-img" id="main-img" style="display:flex;align-items:center;justify-content:center;"></div>
        <div class="product-thumbs" id="product-thumbs"></div>
      </div>
    </div>

    <!-- RIGHT: Info -->
    <div>
      <div class="product-info-panel">
        <span class="product-cat-tag" id="prod-cat">Category</span>
        <h1 id="prod-name">Loading...</h1>
        <div class="product-big-price" id="prod-price"></div>
        <div class="product-stars" id="prod-stars"></div>

        <!-- Shop link -->
        <a class="product-shop-link" id="shop-link" href="#">
          <div class="product-shop-avatar" id="shop-emoji" style="display:flex;align-items:center;justify-content:center;"></div>
          <div class="product-shop-info">
            <strong id="shop-name-link">Shop</strong>
            <span id="shop-loc-link">Location</span>
          </div>
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="#9ca3af" stroke-width="2" style="margin-left:auto;"><path d="M9 18l6-6-6-6"/></svg>
        </a>

        <hr class="product-divider">

        <div class="product-stock-label" id="prod-stock"></div>

        <!-- Qty -->
        <div class="qty-row">
          <span class="qty-label">Quantity:</span>
          <div class="qty-control">
            <button class="qty-btn" onclick="changeQty(-1)">−</button>
            <span class="qty-val" id="qty-val">1</span>
            <button class="qty-btn" onclick="changeQty(1)">+</button>
          </div>
        </div>

        <!-- Action buttons -->
        <div class="product-action-row">
          <button class="btn-add-cart" id="btn-cart" onclick="addToCart()">
            <i class="ti ti-shopping-cart"></i> Add to Cart
          </button>
          <button class="btn-buy-now" onclick="buyNow()">
            <i class="ti ti-bolt"></i> Buy Now
          </button>
        </div>

        <hr class="product-divider">
        <p class="product-desc" id="prod-desc"></p>
      </div>
    </div>
  </div>

  <!-- RELATED PRODUCTS -->
  <div class="related-section">
    <h2>More from this shop</h2>
    <div class="product-grid" id="related-grid"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script>
    let currentProduct = null;
    let currentShop    = null;
    let qty = 1;

    function mainMediaHTML(product) {
      if (product.video_url) {
        const poster = product.image_url ? `poster="${product.image_url}"` : '';
        return `<div class="video-player" onclick="playProductVideo()">
          <video id="prod-video" src="${product.video_url}" ${poster} playsinline preload="metadata"></video>
          <button class="video-play-btn" id="video-play-btn" aria-label="Play video" type="button">
            <svg viewBox="0 0 24 24" width="30" height="30" fill="#fff"><path d="M8 5v14l11-7z"/></svg>
          </button>
          <span class="video-badge"><i class="ti ti-player-play-filled"></i> Video</span>
        </div>`;
      }
      if (product.image_url) {
        return `<img src="${product.image_url}" style="width:100%;height:100%;object-fit:cover;display:block;" alt="${product.name}">`;
      }
      return `<i class="ti ti-${product.icon || 'package'}" style="font-size:5rem;color:#9ca3af;"></i>`;
    }

    function thumbHTML(product, idx) {
      if (product.video_url) {
        return `<div style="position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#111;border-radius:6px;">
          <i class="ti ti-player-play-filled" style="font-size:1.6rem;color:#fff;"></i>
        </div>`;
      }
      if (product.image_url) {
        return `<img src="${product.image_url}" style="width:100%;height:100%;object-fit:cover;border-radius:6px;" alt="${product.name}">`;
      }
      return `<i class="ti ti-${product.icon || 'package'}" style="font-size:1.5rem;color:#9ca3af;"></i>`;
    }

    async function init() {
      const params = new URLSearchParams(window.location.search);
      const pid = params.get('id');
      if (!pid) { showError('No product specified.'); return; }

      let product;
      try {
        product = await ProductsAPI.get(pid);
      } catch (err) {
        showError('Product not found.');
        return;
      }

      currentProduct = product;
      currentShop    = product.shops;

      document.title = product.name + ' — ShopSwift';

      document.getElementById('bread-shop').textContent = currentShop.name;
      document.getElementById('bread-shop').href = `shop.html?id=${currentShop.id}`;
      document.getElementById('bread-product').textContent = product.name;

      const mainImg = document.getElementById('main-img');
      const hasMedia = product.video_url || product.image_url;
      mainImg.style.padding   = hasMedia ? '0' : '';
      mainImg.style.overflow  = hasMedia ? 'hidden' : '';
      mainImg.style.background = product.video_url ? '#000' : '';
      mainImg.innerHTML = mainMediaHTML(product);

      document.getElementById('product-thumbs').innerHTML = `
        <div class="product-thumb-item active" style="display:flex;align-items:center;justify-content:center;">
          ${thumbHTML(product, 0)}
        </div>`;

      document.getElementById('prod-cat').textContent    = product.cat || currentShop.cat || '';
      document.getElementById('prod-name').textContent   = product.name;
      document.getElementById('prod-price').textContent  = `FCFA ${Number(product.price).toLocaleString()}`;

      const r = currentShop.rating || 0;
      const rc = currentShop.review_count || 0;
      document.getElementById('prod-stars').innerHTML =
        `<span style="color:#d4a017;">${'★'.repeat(Math.floor(r))}${'☆'.repeat(5 - Math.floor(r))}</span> ` +
        `<span style="color:#6b7280;font-size:13px;">${r} (${rc} reviews)</span>`;

      document.getElementById('shop-link').href      = `shop.html?id=${currentShop.id}`;
      document.getElementById('shop-emoji').innerHTML = currentShop.emoji || '<i class="ti ti-building-store" style="font-size:1.4rem;color:#6b7280;"></i>';
      document.getElementById('shop-name-link').textContent = currentShop.name;
      document.getElementById('shop-loc-link').textContent  = ` ${currentShop.loc}`;

      const stockEl = document.getElementById('prod-stock');
      const cartBtn = document.getElementById('btn-cart');
      if (product.stock === 0) {
        stockEl.innerHTML = `Stock: <span class="stock-out">Out of stock</span>`;
        cartBtn.disabled = true;
        cartBtn.style.opacity = '0.5';
      } else if (product.stock <= 5) {
        stockEl.innerHTML = `Stock: <span class="stock-low">Only ${product.stock} left!</span>`;
      } else {
        stockEl.innerHTML = `Stock: <span class="stock-in">In stock (${product.stock} available)</span>`;
      }

      document.getElementById('prod-desc').textContent =
        product.description || 'High-quality product from a trusted seller on ShopSwift.';

      /* Owners cannot buy from their own shop — replace the buy buttons */
      if (isOwnShop()) {
        const row = document.querySelector('.product-action-row');
        if (row) {
          row.innerHTML = `<div style="flex:1;padding:12px 14px;background:#f3f4f6;border:1px solid #e5e7eb;border-radius:10px;color:#6b7280;font-size:14px;font-weight:500;text-align:center;">
            <i class="ti ti-building-store"></i> This is your shop — you can't buy your own products.
          </div>`;
        }
      }

      loadRelated();
    }

    async function loadRelated() {
      let related = [];
      try {
        const all = await ShopsAPI.products(currentShop.id);
        related = all.filter(p => p.id !== currentProduct.id).slice(0, 4);
      } catch (_) {}

      document.getElementById('related-grid').innerHTML = related.map(p => `
        <a class="product-card" href="product.html?id=${p.id}">
          <div class="product-img" style="${(p.image_url || p.video_url) ? 'padding:0;overflow:hidden;position:relative;' : 'display:flex;align-items:center;justify-content:center;'}">
            ${p.image_url
              ? `<img src="${p.image_url}" style="width:100%;height:100%;object-fit:cover;display:block;" alt="${p.name}">`
              : p.video_url
                ? `<video src="${p.video_url}#t=0.1" muted preload="metadata" style="width:100%;height:100%;object-fit:cover;display:block;background:#000;"></video><span class="card-video-badge"><i class="ti ti-player-play-filled" style="color:#fff;font-size:0.9rem;"></i></span>`
                : `<i class="ti ti-${p.icon || 'package'}" style="font-size:2.5rem;color:#9ca3af;"></i>`}
          </div>
          <div class="product-body">
            <div class="product-title">${p.name}</div>
            <div class="product-price">FCFA ${Number(p.price).toLocaleString()}</div>
            <div class="product-stock">${p.stock > 0 ? 'In stock' : 'Out of stock'}</div>
          </div>
          <button class="product-add-btn" onclick="quickAdd(event,'${p.id}',this)">Add to Cart</button>
        </a>
      `).join('') || '<p style="color:#9ca3af;">No other products in this shop yet.</p>';
    }

    function showError(msg) {
      document.getElementById('prod-name').textContent = msg;
      document.getElementById('prod-desc').textContent = '';
    }

    function changeQty(delta) {
      const max = currentProduct ? (currentProduct.stock || 99) : 99;
      qty = Math.max(1, Math.min(max, qty + delta));
      document.getElementById('qty-val').textContent = qty;
    }

    /* A shop owner cannot buy products from their own store */
    function isOwnShop() {
      return Auth.isLoggedIn() && currentShop && Auth.getUser()?.id === currentShop.owner_id;
    }

    function playProductVideo() {
      const v = document.getElementById('prod-video');
      if (!v) return;
      const btn  = document.getElementById('video-play-btn');
      const badge = document.querySelector('.video-badge');
      const wrap = v.closest('.video-player');
      v.setAttribute('controls', 'controls');
      if (btn)   btn.remove();
      if (badge) badge.remove();
      if (wrap)  wrap.onclick = null;   /* hand control to native player */
      v.play().catch(() => {});
    }

    function addToCart() {
      if (isOwnShop()) { alert("You can't buy products from your own shop."); return; }
      if (!currentProduct || currentProduct.stock === 0) return;
      const btn = document.getElementById('btn-cart');
      addToCartAndNotify(currentProduct.id, qty, btn);
    }

    function buyNow() {
      if (isOwnShop()) { alert("You can't buy products from your own shop."); return; }
      if (!Auth.isLoggedIn()) {
        if (typeof showSigninPrompt === 'function') showSigninPrompt('Sign in to purchase this product');
        else window.location.href = `project.html?redirect=${encodeURIComponent(window.location.href)}`;
        return;
      }
      addToCartAndNotify(currentProduct.id, qty).then(() => {
        window.location.href = 'checkout.html';
      }).catch(() => {});
    }

    function quickAdd(e, productId, btn) {
      e.preventDefault();
      e.stopPropagation();
      if (isOwnShop()) { alert("You can't buy products from your own shop."); return; }
      addToCartAndNotify(productId, 1, btn);
    }

    init();
  </script>

  <script>
    fetch('header.html')
      .then(r => r.text())
      .then(html => { const ph = document.getElementById('header-placeholder'); ph.appendChild(document.createRange().createContextualFragment(html)); })
      .catch(() => console.warn('header.html could not be loaded.'));
  </script>
</body>
</html>
